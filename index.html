<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#7c6af7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ListFlow">
  <link rel="manifest" href="manifest.json">
  <title>ListFlow</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧰</text></svg>">
  <link rel="apple-touch-icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧰</text></svg>">
  <style>
    :root {
      --bg: #0e0e0f;
      --surface: #161618;
      --surface2: #1e1e21;
      --border: #2a2a2e;
      --accent: #7c6af7;
      --red: #e8565e;
      --green: #3ecf8e;
      --yellow: #e8c84a;
      --blue: #4fa7e8;
      --orange: #f0804b;
      --text: #e8e8ec;
      --text2: #888892;
      --text3: #55555e;
      --r: 10px;
      --sab: env(safe-area-inset-bottom, 0px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent }
    html, body { height: 100%; overflow: hidden }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; display: flex; flex-direction: column; height: 100dvh }

    .hdr { display: flex; align-items: center; padding: 0 14px; height: 72px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 10px; z-index: 50 }
    .logo { font-size: 18px; font-weight: 800; color: var(--accent); letter-spacing: -.5px }
    .logo span { color: var(--text) }
    .hpill { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--text3); border: 1px solid var(--border); padding: 2px 7px; border-radius: 20px }
    .hright { margin-left: auto; display: flex; gap: 6px }
    .ibtn { width: 36px; height: 46px; border-radius: var(--r); background: var(--surface2); border: 1px solid var(--border); color: var(--text2); font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s }
    .ibtn:active { opacity: .7; transform: scale(.93) }

    .body { flex: 1; display: flex; overflow: hidden; position: relative }

    /* ─── SIDEBAR ─── */
    .sidebar { width: 270px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; transition: transform .3s cubic-bezier(.4, 0, .2, 1); z-index: 40; }
    @media(max-width:680px) {
      .sidebar { position: absolute; top: 0; left: 0; bottom: 0; transform: translateX(-100%); box-shadow: 6px 0 30px rgba(0,0,0,.6) }
      .sidebar.open { transform: translateX(0) }
      .overlay { position: absolute; inset: 0; background: rgba(0,0,0,.55); z-index: 39; display: none }
      .overlay.open { display: block }
    }
    @media(min-width:681px) { .overlay { display: none !important } .mbtn { display: none !important } }

    .sb-search-wrap { position: relative; padding: 10px 12px; flex-shrink: 0; border-bottom: 1px solid var(--border); }
    .sb-search-wrap input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px; padding: 8px 32px 8px 12px; outline: none; transition: border-color .2s; }
    .sb-search-wrap input:focus { border-color: var(--accent) }
    .sb-search-wrap input::placeholder { color: var(--text3) }
    .sb-clear { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text3); font-size: 14px; cursor: pointer; padding: 2px; line-height: 1; display: none; }
    .sb-clear.visible { display: flex; align-items: center; justify-content: center }

    .sb-section { display: flex; flex-direction: column; min-height: 0; transition: flex .35s cubic-bezier(.4,0,.2,1); }
    .sb-section.expandido { flex: 3 }
    .sb-section.recolhido { flex: 0.6 }
    .sb-section:not(.expandido):not(.recolhido) { flex: 1 }
    .sb-section-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px 6px; flex-shrink: 0; cursor: pointer; user-select: none; }
    .sb-section-header:active { opacity: .7 }
    .sb-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); display: flex; align-items: center; gap: 6px; }
    .sb-label-count { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--text3); border: 1px solid var(--border); padding: 1px 6px; border-radius: 20px; font-weight: 400; text-transform: none; letter-spacing: 0; }
    .sb-section-body { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0 8px 8px; min-height: 0; }
    .sb-section-body::-webkit-scrollbar { width: 3px }
    .sb-section-body::-webkit-scrollbar-track { background: transparent }
    .sb-section-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px }
    .sb-divider { height: 1px; background: var(--border); flex-shrink: 0; margin: 0; }

    .pg { display: flex; flex-direction: column; gap: 2px }
    .prow { display: flex; align-items: center; gap: 8px; padding: 8px 6px; border-radius: var(--r); cursor: pointer; transition: background .15s; border: 1px solid transparent; user-select: none; }
    .prow:active { opacity: .8 }
    .prow.on { background: rgba(124,106,247,.1); border-color: rgba(124,106,247,.2) }
    .prow.sb-hidden { display: none }
    .picon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0 }
    .pinfo { flex: 1; min-width: 0 }
    .pname { font-size: 12px; font-weight: 600; color: var(--text2) }
    .prow.on .pname { color: var(--accent) }
    .pdesc { font-size: 10px; color: var(--text3); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
    .tpill { width: 32px; height: 18px; border-radius: 9px; background: var(--border); position: relative; transition: background .2s; flex-shrink: 0; }
    .tpill::after { content: ''; position: absolute; width: 12px; height: 12px; border-radius: 50%; background: white; top: 3px; left: 3px; transition: transform .2s; }
    .prow.on .tpill { background: var(--accent) }
    .prow.on .tpill::after { transform: translateX(14px) }

    .lents { display: flex; flex-direction: column; gap: 2px }
    .lent { display: flex; align-items: center; gap: 8px; padding: 9px 6px; border-radius: var(--r); cursor: pointer; transition: background .15s; border: 1px solid transparent; }
    .lent:active { opacity: .8 }
    .lent.on { background: rgba(124,106,247,.1); border-color: rgba(124,106,247,.2) }
    .lent.sb-hidden { display: none }
    .ldot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; opacity: .4 }
    .lent.on .ldot { opacity: 1 }
    .lname { flex: 1; font-size: 13px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
    .lent.on .lname { color: var(--text) }
    .lcnt { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--text3); flex-shrink: 0 }
    .ldel { width: 20px; height: 20px; border-radius: 5px; border: none; background: transparent; color: var(--text3); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .15s; }
    .lent:hover .ldel, .lent:active .ldel { opacity: 1 }

    .sb-foot { padding: 10px 12px; border-top: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; gap: 6px; }
    .nlbtn { width: 100%; padding: 10px; border-radius: var(--r); background: rgba(124,106,247,.1); border: 1px dashed rgba(124,106,247,.35); color: var(--accent); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: background .15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .nlbtn:active { background: rgba(124,106,247,.2) }
    .guidebtn { width: 100%; padding: 8px; border-radius: var(--r); background: transparent; border: 1px solid var(--border); color: var(--text3); font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .guidebtn:active { opacity: .7 }

    /* ─── MAIN ─── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0 }
    .tb { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 14px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; overflow-x: auto; scrollbar-width: none }
    .tb::-webkit-scrollbar { display: none }
    .tbsep { width: 1px; height: 33px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
    .tbbtn { padding: 8px 7px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all .15s; display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .tbbtn:active { opacity: .75; transform: scale(.97) }
    .tbbtn.pri { background: var(--accent); border-color: var(--accent); color: white }
    @media (max-width: 767px) { .tbbtn.pri { display: none; } }

    .srch { position: relative; flex-shrink: 0 }
    .srch input { height: 33px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 0px 10px 0px 30px; outline: none; width: 150px; transition: all .2s; }
    .srch input:focus { border-color: var(--accent); width: 200px }
    .srch input::placeholder { color: var(--text3) }
    .sicon { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 13px; pointer-events: none }
    .srch-clear { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text3); font-size: 14px; cursor: pointer; padding: 2px; line-height: 1; display: none; }
    .srch-clear.visible { display: flex; align-items: center; justify-content: center }

    /* ─── CONTENT ─── */
    .cnt { flex: 1; overflow: auto; padding: 16px; padding-bottom: calc(80px + var(--sab)); display: flex; flex-direction: column; gap: 14px }
    .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; text-align: center; padding: 40px 20px; color: var(--text3) }
    .empty-ico { font-size: 60px; opacity: .2 }
    .empty h2 { font-size: 18px; color: var(--text2) }
    .empty p { font-size: 13px; line-height: 1.7; max-width: 280px }
    .lhdr { display: flex; flex-direction: column; gap: 8px }
    .ltrow { display: flex; align-items: center; gap: 10px }
    .ltinput { flex: 1; font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; background: transparent; border: none; color: var(--text); outline: none; border-bottom: 2px solid transparent; transition: border-color .2s; min-width: 0 }
    .ltinput:focus { border-bottom-color: var(--accent) }

    .prog { display: flex; flex-direction: column; gap: 4px }
    .pgbg { background: var(--surface2); border-radius: 99px; height: 5px; overflow: hidden }
    .pgfill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 99px; transition: width .4s cubic-bezier(.4,0,.2,1) }
    .pglabel { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text3) }

    .import { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden }
    .import summary { padding: 11px 14px; cursor: pointer; font-size: 13px; color: var(--text2); font-weight: 600; list-style: none; display: flex; align-items: center; gap: 8px }
    .import summary::-webkit-details-marker { display: none }
    .import-body { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 8px }
    .import-body textarea { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 10px; resize: vertical; min-height: 90px; outline: none; transition: border-color .2s; line-height: 1.7; width: 100% }
    .import-body textarea:focus { border-color: var(--accent) }
    .import-hint { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; line-height: 1.5 }
    .import-acts { display: flex; gap: 8px; flex-wrap: wrap }

    .iblock { display: flex; flex-direction: column; min-width: max-content; width: 100% }
    .irow { display: flex; align-items: flex-start; gap: 5px; padding: 5px 6px; border-radius: 8px; transition: background .1s; min-width: max-content; width: 100% }
    .irow:active { background: var(--surface2) }
    .itog { padding: 14px 16px 14px 6px; width: 20px; height: 20px; flex-shrink: 0; margin-top: 5px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text3); font-size: 24px; border-radius: 4px; transition: all .15s; user-select: none; }
    .itog.nc { opacity: 0; pointer-events: none }
    .icb { width: 30px; height: 28px; flex-shrink: 0; margin-top: 5px; appearance: none; -webkit-appearance: none; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; position: relative; transition: all .2s; background: transparent }
    .icb:checked { background: var(--accent); border-color: var(--accent) }
    .icb:checked::after { content: ''; position: absolute; left: 7px; top: 4px; width: 6px; height: 10px; border: 2px solid white; border-left: none; border-top: none; transform: rotate(45deg) }
    .icb.par { border-color: var(--accent); }
    .icb.par::after { content: ''; position: absolute; left: 7px; border-radius: 1px }
    .ibody { flex: 1; min-width: 0; padding-top: 3px }
    .itext { font-size: 16px; line-height: 1.5; color: var(--text); outline: none; background: transparent; border: none; font-family: 'JetBrains Mono', monospace; cursor: text; white-space: pre-wrap; word-break: break-word; display: block; min-height: 20px }
    .itext.done { color: var(--text3) }
    .imeta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; align-items: center }
    .iend { display: flex; align-items: center; gap: 4px; margin-top: 4px; flex-wrap: wrap }
    .iabtn { width: 43px; height: 22px; border-radius: 8px; border: none; background: var(--surface2); color: var(--text3); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; }
    .iabtn:active { opacity: .7; transform: scale(.91) }
    .kids { padding-left: 20px; border-left: 1px solid var(--border); margin-left: 12px; min-width: max-content }
    .kids.col { display: none }

    .tag { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 7px; border-radius: 20px; border: 1px solid; cursor: pointer; line-height: 1.4; white-space: nowrap }
    .tred { color: #e8565e; border-color: rgba(232,86,94,.4); background: rgba(232,86,94,.1) }
    .toran { color: #f0804b; border-color: rgba(240,128,75,.4); background: rgba(240,128,75,.1) }
    .tyel { color: #e8c84a; border-color: rgba(232,200,74,.4); background: rgba(232,200,74,.1) }
    .tgrn { color: #3ecf8e; border-color: rgba(62,207,142,.4); background: rgba(62,207,142,.1) }
    .tblu { color: #4fa7e8; border-color: rgba(79,167,232,.4); background: rgba(79,167,232,.1) }
    .tpur { color: #a57af0; border-color: rgba(165,122,240,.4); background: rgba(165,122,240,.1) }
    .tpnk { color: #e87ac8; border-color: rgba(232,122,200,.4); background: rgba(232,122,200,.1) }
    .due { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 7px; border-radius: 20px; white-space: nowrap; cursor: pointer }
    .dnorm { color: var(--text3); background: var(--surface2); border: 1px solid var(--border) }
    .dsoon { color: #e8c84a; background: rgba(232,200,74,.1); border: 1px solid rgba(232,200,74,.3) }
    .dover { color: var(--red); background: rgba(232,86,94,.1); border: 1px solid rgba(232,86,94,.3) }
    .pribadge { font-size: 13px; width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer; flex-shrink: 0; margin-top: 5px; background: var(--surface2) }
    .inote { font-size: 12px; color: var(--text3); font-family: 'JetBrains Mono', monospace; line-height: 1.5; margin-top: 4px; border-left: 2px solid var(--border); padding-left: 8px; outline: none; word-break: break-word; min-height: 16px }
    .estbadge { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--blue); background: rgba(79,167,232,.1); border: 1px solid rgba(79,167,232,.3); padding: 2px 7px; border-radius: 20px; white-space: nowrap }
    .recbadge { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--green); background: rgba(62,207,142,.1); border: 1px solid rgba(62,207,142,.3); padding: 2px 7px; border-radius: 20px; white-space: nowrap; cursor: pointer }
    .lcbadge { display: inline-block; width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0 }
    .linkbadge { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--blue); padding: 2px 7px; border-radius: 20px; background: rgba(79,167,232,.1); border: 1px solid rgba(79,167,232,.3); white-space: nowrap; text-decoration: none; cursor: pointer; display: inline-flex; align-items: center; gap: 3px }

    .export-panel { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); padding: 12px; display: flex; flex-direction: column; gap: 8px }
    .export-pre { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text2); overflow-x: auto; white-space: pre; max-height: 160px; overflow-y: auto }

    .kanban-wrap { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; min-height: 200px }
    .kanban-col { min-width: 200px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); display: flex; flex-direction: column; flex-shrink: 0 }
    .kanban-hdr { padding: 10px 12px; font-size: 12px; font-weight: 700; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px }
    .kanban-body { padding: 8px; display: flex; flex-direction: column; gap: 6px; flex: 1 }
    .kanban-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 13px; line-height: 1.4; cursor: pointer; transition: all .15s }
    .kanban-card:active { opacity: .75 }
    .kanban-card.done-card { text-decoration: line-through; color: var(--text3) }

    .fab { position: fixed; left: 18px; bottom: calc(148px + var(--sab)); width: 54px; height: 54px; border-radius: 50%; background: var(--accent); border: none; color: white; font-size: 28px; cursor: pointer; box-shadow: 0 4px 22px rgba(124,106,247,.55); display: flex; align-items: center; justify-content: center; z-index: 30; transition: all .2s }
    .fab:active { transform: scale(.91) }
    @media(min-width:681px) { .fab { display: none } }

    .mback { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity .25s }
    .mback.open { opacity: 1; pointer-events: all }
    .msheet { background: var(--surface); border-radius: 18px 18px 0 0; padding: 20px 20px calc(20px + var(--sab)); width: 100%; max-width: 520px; max-height: 88vh; display: flex; flex-direction: column; gap: 14px; transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1); overflow-y: auto }
    .mback.open .msheet { transform: translateY(0) }
    .mhandle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto -4px }
    .mtitle { text-align: center; font-size: 16px; font-weight: 700; }
    .macts { margin-top: 18px; display: flex; gap: 8px; flex-direction: row-reverse; }
    .fg { display: flex; flex-direction: column; gap: 6px }
    .fl { font-size: 12px; color: var(--text3); font-weight: 600; letter-spacing: .5px }
    input[type=text], input[type=date], input[type=url], input[type=number], select, .fta { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); color: var(--text); font-family: 'Syne', sans-serif; font-size: 15px; padding: 5px 6px 5px 34px; outline: none; width: 100%; transition: border-color .2s }
    input:focus, select:focus, .fta:focus { border-color: var(--accent) }
    .fta { resize: vertical; min-height: 80px; font-size: 13px; font-family: 'JetBrains Mono', monospace; line-height: 1.7 }
    .cpick { display: flex; gap: 10px; flex-wrap: wrap; padding: 4px 0 }
    .copt { width: 34px; height: 34px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all .15s }
    .copt.sel { border-color: white; transform: scale(1.18) }
    .co-red { background: #e8565e } .co-oran { background: #f0804b } .co-yel { background: #e8c84a }
    .co-grn { background: #3ecf8e } .co-blu { background: #4fa7e8 } .co-pur { background: #a57af0 } .co-pnk { background: #e87ac8 }
    .lcswatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all .15s }
    .lcswatch.sel { border-color: white; transform: scale(1.15) }
    .btn { margin-top: 11px; padding: 11px 16px; border-radius: var(--r); border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 6px }
    .btn:active { opacity: .75 }
    .btn.pri { background: var(--accent); border-color: var(--accent); color: white; flex: 1 }
    .btn.full { width: 100% }
    .btn.dng { margin-top: 1px; border-color: rgba(232,86,94,.4); color: var(--red) }

    .cpiece { position: fixed; width: 8px; height: 8px; z-index: 999; animation: cfal 1.2s ease-in forwards; pointer-events: none }
    @keyframes cfal { 0% { transform: translateY(0) rotate(0); opacity: 1 } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0 } }

    ::-webkit-scrollbar { width: 4px } ::-webkit-scrollbar-track { background: transparent } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px }
    .search-hidden { display: none !important }
    .smatch { color: var(--green) !important }
    .pg::-webkit-scrollbar { width: 3px } .lents::-webkit-scrollbar { width: 3px }

    .guide-block { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; display: flex; flex-direction: column; gap: 8px }
    .guide-block h4 { font-size: 13px; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 6px }
    .guide-block p, .guide-block li { font-size: 12px; color: var(--text2); line-height: 1.7; font-family: 'JetBrains Mono', monospace }
    .guide-block ul { padding-left: 16px; display: flex; flex-direction: column; gap: 2px }
    code { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent) }

    .view-tabs { display: flex; gap: 6px }
    .vtab { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text3); font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; transition: all .15s }
    .vtab.on { background: var(--accent); border-color: var(--accent); color: white }
    .vtab:active { opacity: .75 }
  </style>
</head>

<body>
  <div class="body">
    <div class="overlay" id="ov" onclick="closeSB()"></div>
    <aside class="sidebar" id="sb">
      <div class="sb-section" id="sbSectionPlugins" onmouseenter="_sbExpandir('plugins')" ontouchstart="_sbExpandir('plugins')">

          <span style="font-size:10px;color:var(--text3)" id="sbPluginArrow">▼</span>
        </div>
        <div class="sb-section-body"><div class="pg" id="pg"></div></div>
      </div>
      <div class="sb-divider"></div>
      <div class="sb-section" id="sbSectionListas" onmouseenter="_sbExpandir('listas')" ontouchstart="_sbExpandir('listas')">
        <div class="sb-section-header" onclick="_sbExpandir('listas')">
          <div class="sb-label">📋 Listas <span class="sb-label-count" id="hpill">0</span></div>
          <span style="font-size:10px;color:var(--text3)" id="sbListasArrow">▼</span>
        </div>
        <div class="sb-section-body"><div class="lents" id="lents"></div></div>
      </div>
      <div class="sb-search-wrap">
        <input type="text" id="sbSearch" placeholder="🔍 Buscar plugin ou lista..." oninput="filterSB(this.value);toggleSbClear(this)">
        <button class="sb-clear" id="sbClear" onclick="clearSBSearch()" title="Limpar">✕</button>
      </div>
      <div class="sb-foot">
        <button class="nlbtn" onclick="newList()">＋ Nova lista</button>
        <button class="guidebtn" onclick="abrirGerenciadorPlugins()" style="border-color:rgba(124,106,247,.35);color:var(--accent)">🔌 Gerenciar plugins</button>
        <button class="guidebtn" onclick="openGuide()">📖 Como criar um plugin</button>
      </div>
    </aside>

    <div class="main">
      <div class="cnt" id="cnt">
        <div class="empty" id="es">
          <div class="empty-ico">☑</div>
          <h2>Sem lista ativa</h2>
          <p>Crie uma lista pelo menu lateral ou pelo botão abaixo.</p>
          <button class="btn pri" onclick="newList()" style="margin-top:8px;flex:0;padding:12px 28px">＋ Criar lista</button>
        </div>
        <div id="lv" style="display:none;flex-direction:column;gap:14px"></div>
      </div>
    </div>
  </div>

  <button class="fab" id="fab" onclick="addItem()" style="display:none">＋</button>
  <div class="tb" id="tb"></div>
  <div class="mback" id="mb" onclick="onBD(event)">
    <div class="msheet" id="ms"><div class="mhandle"></div><div id="mc"></div></div>
  </div>
  <div class="hdr">
    <button class="ibtn mbtn" onclick="toggleSB()">☰</button>
    <div class="logo">List<span>Flow</span></div>
    <div class="hright">
      <button class="ibtn" onclick="exportJ()" title="Exportar JSON">⬆</button>
      <button class="ibtn" onclick="importJ()" title="Importar JSON">⬇</button>
    </div>
  </div>

  <script>
    // ══════════════════════════════════════════════════════
    //  CORE STATE
    // ══════════════════════════════════════════════════════
    let S = { lists: [], active: null, plugins: {} };
    const save = () => localStorage.setItem('lf4', JSON.stringify(S));
    function load() { try { const r = localStorage.getItem('lf4'); if (r) S = JSON.parse(r); } catch (e) { } }
    const genId = () => Math.random().toString(36).slice(2, 10);
    const esc = s => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    const getL = () => S.lists.find(l => l.id === S.active) || null;

    // ══════════════════════════════════════════════════════
    //  HELPERS GENÉRICOS — facilitam criação de novos plugins
    // ══════════════════════════════════════════════════════

    // ── 1. IndexedDB genérico ─────────────────────────────
    function criarDB(nomeDB, nomeStore) {
      let db = null;
      const init = () => new Promise((res, rej) => {
        if (db) { res(); return; }
        const req = indexedDB.open(nomeDB, 1);
        req.onupgradeneeded = e => {
          if (!e.target.result.objectStoreNames.contains(nomeStore))
            e.target.result.createObjectStore(nomeStore, { keyPath: 'id' });
        };
        req.onsuccess = e => { db = e.target.result; res(); };
        req.onerror = e => rej(e);
      });
      return {
        async salvar(id, blob) {
          await init();
          return new Promise((res, rej) => {
            const tx = db.transaction(nomeStore, 'readwrite');
            tx.objectStore(nomeStore).put({ id, blob });
            tx.oncomplete = res; tx.onerror = rej;
          });
        },
        async carregar(id) {
          await init();
          return new Promise((res, rej) => {
            const tx = db.transaction(nomeStore, 'readonly');
            const r = tx.objectStore(nomeStore).get(id);
            r.onsuccess = e => res(e.target.result?.blob || null);
            r.onerror = rej;
          });
        },
        async deletar(id) {
          await init();
          return new Promise((res, rej) => {
            const tx = db.transaction(nomeStore, 'readwrite');
            tx.objectStore(nomeStore).delete(id);
            tx.oncomplete = res; tx.onerror = rej;
          });
        }
      };
    }

    const _GravDB      = criarDB('listflow_audios',        'audios');
    const _AudInlineDB = criarDB('listflow_audio_inline',  'blobs');

    // ── 2. Tela separada genérica ─────────────────────────
    function criarTelaPlugin({ id, icone, titulo, onAbrir, onFechar }) {
      if (!document.getElementById(id + 'Screen')) {
        const s = document.createElement('div');
        s.id = id + 'Screen';
        s.style.cssText = 'flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;flex-direction:column;gap:16px;background:var(--bg);box-sizing:border-box;display:none;';
        document.querySelector('.body').appendChild(s);
      }
      if (!document.getElementById(id + 'Btn')) {
        const b = document.createElement('button');
        b.id = id + 'Btn'; b.title = titulo; b.textContent = icone;
        b.className = 'ibtn';
        b.onclick = () => alternarTelaPlugin(id, onAbrir, onFechar);
        document.querySelector('.hright').prepend(b);
      }
    }

    function alternarTelaPlugin(id, onAbrir, onFechar) {
      const s   = document.getElementById(id + 'Screen');
      const m   = document.querySelector('.main');
      const btn = document.getElementById(id + 'Btn');
      const fab = document.getElementById('fab');
      if (!s || !m) return;

      const isOpen = s.style.display === 'flex';
      if (isOpen) {
        s.style.display = 'none'; m.style.display = 'flex';
        if (btn) { btn.style.background = ''; btn.style.color = ''; }
        fab.style.display = getL() ? 'flex' : 'none';
        if (onFechar) onFechar();
      } else {
        document.querySelectorAll('[id$="Screen"]').forEach(el => {
          if (el.id !== id + 'Screen' && el.style.display === 'flex') {
            el.style.display = 'none';
            const otherId = el.id.replace('Screen', '');
            const ob = document.getElementById(otherId + 'Btn');
            if (ob) { ob.style.background = ''; ob.style.color = ''; }
          }
        });
        m.style.display = 'none'; s.style.display = 'flex';
        if (btn) { btn.style.background = 'var(--accent)'; btn.style.color = 'white'; }
        fab.style.display = 'none';
        if (onAbrir) onAbrir();
      }
    }

    function telaPluginAberta(id) {
      const s = document.getElementById(id + 'Screen');
      return s && s.style.display === 'flex';
    }

    function renderizarTela(id, html) {
      const s = document.getElementById(id + 'Screen');
      if (s) s.innerHTML = html;
    }

    // ── 3. CSS genérico ───────────────────────────────────
    function injetarCSS(id, css) {
      if (document.getElementById('css-' + id)) return;
      const s = document.createElement('style');
      s.id = 'css-' + id; s.textContent = css;
      document.head.appendChild(s);
    }

    // ── 4. Toast genérico ─────────────────────────────────
    function toast(msg, tipo = 'info', duracao = 2500) {
      document.getElementById('_toastEl')?.remove();
      const cores = {
        info:  'border:1px solid var(--accent);color:var(--text);background:var(--surface)',
        ok:    'border:1px solid rgba(62,207,142,.4);color:var(--green);background:rgba(62,207,142,.12)',
        erro:  'border:1px solid rgba(232,86,94,.4);color:var(--red);background:rgba(232,86,94,.1)',
        aviso: 'border:1px solid rgba(232,200,74,.4);color:var(--yellow);background:rgba(232,200,74,.1)',
      };
      const t = document.createElement('div');
      t.id = '_toastEl';
      t.style.cssText = `position:fixed;top:70px;left:50%;transform:translateX(-50%);
        padding:10px 20px;border-radius:99px;font-family:'Syne',sans-serif;
        font-size:14px;font-weight:700;z-index:9000;white-space:nowrap;
        box-shadow:0 4px 20px rgba(0,0,0,.3);${cores[tipo] || cores.info}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), duracao);
    }

    // ══════════════════════════════════════════════════════
    //  PLUGIN SYSTEM
    // ══════════════════════════════════════════════════════
    const PL = {};
    const reg = (id, def) => PL[id] = { id, ...def };
    const pon = id => !!S.plugins[id];
    const togP = id => {
      S.plugins[id] = !S.plugins[id];
      if (PL[id]?.onToggle) PL[id].onToggle(S.plugins[id]);
      save(); renderAll();
    };

    // ══════════════════════════════════════════════════════
    //  PLUGINS EXISTENTES
    // ══════════════════════════════════════════════════════



    reg('theme', {
      name: 'Tema Claro', icon: '☀️', desc: 'Alterna entre escuro e claro', def: false,
      onToggle(on) {
        const v = (k, d, l) => document.documentElement.style.setProperty(k, on ? l : d);
        v('--bg', '#0e0e0f', '#f2f2f5'); v('--surface', '#161618', '#ffffff');
        v('--surface2', '#1e1e21', '#e8e8ed'); v('--border', '#2a2a2e', '#d2d2da');
        v('--text', '#e8e8ec', '#111116'); v('--text2', '#888892', '#44444e'); v('--text3', '#55555e', '#aaaabc');
      }
    });

    // ══════════════════════════════════════════════════════
    //  GUIA
    // ══════════════════════════════════════════════════════
    function openGuide() {
      openM('📖 Como criar um plugin', `
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="guide-block">
        <h4>⚡ Plugin simples (sem tela)</h4>
        <pre style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);overflow-x:auto">reg('meu-plugin', {
  name: 'Meu Plugin', icon: '⭐',
  desc: 'O que ele faz', def: false,
  abtn(item) { return \`&lt;button class="iabtn"
    onclick="minhaAcao('\${item.id}')">⭐&lt;/button>\`; },
  meta(item) { return item.meuDado ? item.meuDado : ''; }
});
function minhaAcao(id) { /* ... */ }</pre>
      </div>
      <div class="guide-block">
        <h4>🖥️ Plugin com tela própria (usando helpers)</h4>
        <pre style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);overflow-x:auto;line-height:1.7">reg('meuPlugin', {
  name: 'Meu Plugin', icon: '⭐',
  desc: 'Plugin com tela', def: false,
  tb() {
    return pon('meuPlugin')
      ? \`&lt;button class="tbbtn"
          onclick="alternarTelaPlugin('meuPlugin',_render)">
          ⭐ Abrir&lt;/button>\`
      : '';
  },
  onToggle(on) {
    if (on) {
      injetarCSS('meuPlugin', \`.meu-css { color: red }\`);
      criarTelaPlugin({
        id: 'meuPlugin', icone: '⭐',
        titulo: 'Meu Plugin',
        onAbrir: _render,
      });
    } else {
      alternarTelaPlugin('meuPlugin');
      document.getElementById('meuPluginBtn')?.remove();
    }
  }
});
function _render() {
  renderizarTela('meuPlugin', \`&lt;h2>Olá!&lt;/h2>\`);
}</pre>
      </div>
      <div class="guide-block">
        <h4>💾 Salvar arquivos grandes (IndexedDB)</h4>
        <pre style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);overflow-x:auto;line-height:1.7">// Cria banco (uma linha!)
const MeuDB = criarDB('meu_banco', 'arquivos');

// Salvar
await MeuDB.salvar('meu-id', blob);

// Carregar
const blob = await MeuDB.carregar('meu-id');

// Deletar
await MeuDB.deletar('meu-id');</pre>
      </div>
    </div>`, null);
    }

    // ══════════════════════════════════════════════════════
    //  HELPERS DO CORE
    // ══════════════════════════════════════════════════════
    const mkItem = t => ({ id: genId(), text: t, checked: false, collapsed: false, children: [], tags: [], due: null, priority: 'none', note: '', estimate: '', recurrence: null, link: null });
    function find(items, id) { for (const i of items) { if (i.id === id) return i; if (i.children) { const f = find(i.children, id); if (f) return f; } } return null; }
    function remove(items, id) { for (let i = 0; i < items.length; i++) { if (items[i].id === id) { items.splice(i, 1); return true; } if (items[i].children && remove(items[i].children, id)) return true; } return false; }
    function getpar(items, id, par = null) { for (const i of items) { if (i.id === id) return par; if (i.children) { const f = getpar(i.children, id, i); if (f !== undefined) return f; } } }
    function cp(items) { let d = 0, t = 0; const w = a => { for (const i of (a || [])) { t++; if (i.checked) d++; w(i.children) } }; w(items); return { d, t }; }

    function parseT(text) {
      const lines = text.split('\n').filter(l => l.trim()), root = [], stack = [{ ch: root, ind: -1 }];
      for (const line of lines) {
        const raw = line.replace(/^[\s\t]*[-*+]?\s*(\[[xX ]\])?\s*/, '');
        const checked = /\[[xX]\]/.test(line);
        const ind = line.search(/\S/);
        const item = mkItem(raw.trim()); item.checked = checked;
        while (stack.length > 1 && stack[stack.length - 1].ind >= ind) stack.pop();
        stack[stack.length - 1].ch.push(item);
        stack.push({ ch: item.children, ind });
      }
      return root;
    }

    // ══════════════════════════════════════════════════════
    //  RENDER
    // ══════════════════════════════════════════════════════
    function renderAll() { renderSB(); renderTB(); renderCnt(); }

    function renderSB() {
      document.getElementById('pg').innerHTML = Object.values(PL).map(p => `
        <div class="prow ${pon(p.id) ? 'on' : ''}" onclick="togP('${p.id}')">
          <span class="picon">${p.icon}</span>
          <div class="pinfo"><div class="pname">${p.name}</div><div class="pdesc">${p.desc}</div></div>
          <div class="tpill"></div>
        </div>`).join('');
      document.getElementById('lents').innerHTML = S.lists.map(l => {
        const { d, t } = cp(l.items); const on = l.id === S.active;
        const c = l.color || '#3ecf8e';
        return `<div class="lent ${on ? 'on' : ''}" onclick="selL('${l.id}');closeSB()">
          <div class="ldot" style="background:${c}"></div>
          <div class="lname">${esc(l.name)}</div>
          <div class="lcnt">${d}/${t}</div>
          <button class="ldel" onclick="event.stopPropagation();confirmarDel('lista','${l.id}')">✕</button>
        </div>`;
      }).join('');
      document.getElementById('hpill').textContent = `${S.lists.length} lista${S.lists.length !== 1 ? 's' : ''}`;
    }

    function filterSB(q) {
      const qu = (q || '').toLowerCase().trim();
      let visP = 0;
      document.querySelectorAll('#pg .prow').forEach(row => {
        const nome = row.querySelector('.pname')?.textContent?.toLowerCase() || '';
        const desc = row.querySelector('.pdesc')?.textContent?.toLowerCase() || '';
        const hide = qu && !nome.includes(qu) && !desc.includes(qu);
        row.classList.toggle('sb-hidden', hide);
        if (!hide) visP++;
      });
      const pc = document.getElementById('sbPluginCount');
      if (pc) pc.textContent = qu ? `${visP} encontrados` : '';
      document.querySelectorAll('#lents .lent').forEach(row => {
        const nome = row.querySelector('.lname')?.textContent?.toLowerCase() || '';
        row.classList.toggle('sb-hidden', qu && !nome.includes(qu));
      });
    }

    function renderTB() {
      const parts = [
        `<button class="tbbtn pri" onclick="addItem()">＋ Item</button>`,
        `<div class="tbsep"></div>`,
        `<button class="tbbtn" onclick="collapseAll()">⏫</button>`,
        `<button class="tbbtn" onclick="resetAll()">🔁</button>`
      ];
      Object.values(PL).forEach(p => {
        if (pon(p.id) && p.tb) { const h = p.tb(); if (h) { parts.push('<div class="tbsep"></div>'); parts.push(h); } }
      });
      document.getElementById('tb').innerHTML = parts.join('');
    }

    function collapseAll() {
      const l = getL(); if (!l) return;
      const walk = arr => arr.forEach(i => { i.collapsed = true; if (i.children?.length) walk(i.children); });
      walk(l.items); save(); renderCnt();
    }

    function resetAll() {
      const l = getL(); if (!l) return;
      const walk = arr => arr.forEach(i => { i.checked = false; if (i.children?.length) walk(i.children); });
      walk(l.items); save(); renderCnt();
    }

    function renderCnt() {
      const list = getL();
      const es = document.getElementById('es'), lv = document.getElementById('lv'), fab = document.getElementById('fab');
      if (!list) { es.style.display = 'flex'; lv.style.display = 'none'; fab.style.display = 'none'; return; }
      es.style.display = 'none'; lv.style.display = 'flex';
      lv.innerHTML = '';
      fab.style.display = 'flex';
      for (const p of Object.values(PL)) {
        if (pon(p.id) && p.onRenderCnt) {
          const took = p.onRenderCnt(lv, list);
          if (took) { fab.style.display = 'none'; return; }
        }
      }
      const hdr = document.createElement('div'); hdr.className = 'lhdr';
      let hdrHtml = `<div class="ltrow"><input class="ltinput" value="${esc(list.name)}" onchange="renL('${list.id}',this.value)" onblur="renL('${list.id}',this.value)"></div>`;
      Object.values(PL).forEach(p => { if (pon(p.id) && p.hdr) { const h = p.hdr(list); if (h) hdrHtml += h; } });
      hdr.innerHTML = hdrHtml;
      lv.appendChild(hdr);
      let tookTop = false;
      for (const p of Object.values(PL)) {
        if (pon(p.id) && p.onRenderTop) { const took = p.onRenderTop(lv, list); if (took) { tookTop = true; break; } }
      }
      if (!tookTop) {
        const imp = document.createElement('details'); imp.className = 'import';
        imp.innerHTML = `<summary>📋 Importar por texto</summary>
          <div class="import-body">
            <textarea id="ita" placeholder="Um item por linha. Indente para sub-itens:
- Tarefa principal
  - Sub-tarefa
[x] Item já marcado"></textarea>
            <div class="import-acts">
              <button class="btn pri" style="flex:1" onclick="doImport()">Importar</button>
              <button class="btn" onclick="document.getElementById('ita').value=''">Limpar</button>
            </div>
            <div class="import-hint">Prefixos: -, *, + • [x] = marcado • Espaços = aninhamento</div>
          </div>`;
        lv.appendChild(imp);
        const tree = document.createElement('div'); tree.id = 'it';
        rTree(list.items, tree);
        lv.appendChild(tree);
      }
      Object.values(PL).forEach(p => { if (pon(p.id) && p.onRenderBottom) p.onRenderBottom(lv, list); });
      const _si = document.getElementById('si');
      if (_si && _si.value.trim()) {
        const _cnt = document.getElementById('cnt');
        const _scrollPos = _cnt?.scrollTop || 0;
        doSearch(_si.value, true);
        setTimeout(() => { if (_cnt) _cnt.scrollTop = _scrollPos; }, 30);
      }
    }

    function rTree(items, cont) {
      for (const item of items) {
        const blk = document.createElement('div'); blk.className = 'iblock';
        const row = document.createElement('div'); row.className = 'irow'; row.dataset.id = item.id;
        const hk = !!item.children?.length;
        let cbcls = '';
        if (hk) { const { d, t } = cp(item.children); if (d > 0 && d < t) cbcls = 'par'; }
        let pfx = ''; Object.values(PL).forEach(p => { if (pon(p.id) && p.pfx) pfx += p.pfx(item) || ''; });
        let abtns = `<button class="iabtn" title="Sub-item" onclick="addSub('${item.id}')">⊕</button>`;
        abtns += pon('mover') ? `<button class="iabtn" title="Mover / Indentar" onclick="abrirMenuMover('${item.id}',this)">⇅</button>` : '';
        Object.values(PL).forEach(p => { if (pon(p.id) && p.abtn) abtns += p.abtn(item) || ''; });
        abtns += `<button class="iabtn" onclick="confirmarDel('item','${item.id}')" style="color:var(--red);opacity:.7">✕</button>`;

    function doSearch(q, preservarFilhos = false) {
      const qu = (q || '').toLowerCase().trim();
      const l = getL();
      document.querySelectorAll('.itext[data-orig]').forEach(el => { el.innerHTML = el.getAttribute('data-orig'); el.removeAttribute('data-orig'); });
      if (!qu) {
        document.querySelectorAll('.irow').forEach(r => r.classList.remove('search-hidden'));
        if (l) { document.querySelectorAll('.kids').forEach(kids => { const id = (kids.id||'').replace('ch-',''); const item = id ? find(l.items, id) : null; if (item) kids.classList.toggle('col', !!item.collapsed); else kids.classList.add('col'); }); }
        return;
      }
      const matchIds = new Set(), parentIds = new Set();
      function deep(items, pais) {
        for (let i = 0; i < (items||[]).length; i++) {
          const item = items[i];
          if ((item.text||'').toLowerCase().indexOf(qu) !== -1) { matchIds.add(item.id); pais.forEach(pid => parentIds.add(pid)); }
          if (item.children?.length) deep(item.children, pais.concat([item.id]));
        }
      }
      if (l) deep(l.items, []);
      if (l) { document.querySelectorAll('.kids').forEach(kids => { const paiId = (kids.id||'').replace('ch-',''); if (!paiId) return; const item = find(l.items, paiId); if (item && item.collapsed) kids.classList.add('col'); else kids.classList.remove('col'); }); }
      document.querySelectorAll('.irow').forEach(row => {
        const id = row.dataset.id; const itext = row.querySelector('.itext');
        if (matchIds.has(id)) {
          row.classList.remove('search-hidden');
          if (itext) { const texto = itext.innerText||''; itext.setAttribute('data-orig', itext.innerHTML); const re = new RegExp('('+qu.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'); itext.innerHTML = esc(texto).replace(re,'<mark style="background:#e8c84a;color:#111;border-radius:3px;padding:0 3px;font-weight:700">$1</mark>'); }
        } else if (parentIds.has(id)) {
          row.classList.remove('search-hidden');
        } else {
          if (!preservarFilhos) { row.classList.add('search-hidden'); }
          else { const kidsDoMatch = [...matchIds].some(mid => { const el = document.getElementById('ch-'+mid); return el && el.contains(row); }); if (!kidsDoMatch) row.classList.add('search-hidden'); else row.classList.remove('search-hidden'); }
        }
      });
      document.querySelectorAll('.kids').forEach(kids => {
        const paiId = (kids.id||'').replace('ch-',''); if (!paiId) return;
        const item = l ? find(l.items, paiId) : null;
        if (matchIds.has(paiId) || parentIds.has(paiId)) { if (item && item.collapsed) kids.classList.add('col'); else kids.classList.remove('col'); }
        else kids.classList.add('col');
      });
    }

    // Banco de plugins dinâmicos
    const _PluginDB = (() => {
      let db = null;
      const init = () => new Promise((res, rej) => {
        if (db) { res(); return; }
        const req = indexedDB.open('listflow_plugins', 1);
        req.onupgradeneeded = e => {
          if (!e.target.result.objectStoreNames.contains('plugins'))
            e.target.result.createObjectStore('plugins', { keyPath: 'id' });
        };
        req.onsuccess = e => { db = e.target.result; res(); };
        req.onerror = e => rej(e);
      });
      return {
        async salvar(id, codigo, meta) {
          await init();
          return new Promise((res, rej) => {
            const tx = db.transaction('plugins', 'readwrite');
            tx.objectStore('plugins').put({ id, codigo, meta, ts: Date.now() });
            tx.oncomplete = res; tx.onerror = rej;
          });
        },
        async listar() {
          await init();
          return new Promise((res, rej) => {
            const tx = db.transaction('plugins', 'readonly');
            const req = tx.objectStore('plugins').getAll();
            req.onsuccess = e => res(e.target.result || []);
            req.onerror = rej;
          });
        },
        async deletar(id) {
          await init();
          return new Promise((res, rej) => {
            const tx = db.transaction('plugins', 'readwrite');
            tx.objectStore('plugins').delete(id);
            tx.oncomplete = res; tx.onerror = rej;
          });
        }
      };
    })();

          flex-direction: column-reverse;gap:14px;background:var(--bg);box-sizing:border-box;display:none;}
        .gp-card{background:var(--surface);border:1px solid var(--border);
          border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:10px;}
        .gp-card-header{display:flex;align-items:center;gap:10px;}
        .gp-card-icon{font-size:24px;width:36px;text-align:center;flex-shrink:0;}
        .gp-card-info{flex:1;min-width:0;}
        .gp-card-name{font-size:14px;font-weight:700;color:var(--text);}
        .gp-card-desc{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:2px;}
        .gp-card-ts{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
        .gp-card-acoes{display:flex;gap:6px;flex-wrap:wrap;}
        .gp-btn{padding:5px 12px;border-radius:8px;border:1px solid var(--border);
          background:var(--surface2);color:var(--text2);font-size:11px;font-weight:600;
          font-family:'Syne',sans-serif;cursor:pointer;transition:all .15s;}
        .gp-btn:active{opacity:.7}
        .gp-btn.danger{border-color:rgba(232,86,94,.4);color:var(--red);}
        .gp-btn.success{border-color:rgba(62,207,142,.4);color:var(--green);}
        .gp-btn.pri{background:var(--accent);border-color:var(--accent);color:white;}
        .gp-status{font-size:11px;font-family:'JetBrains Mono',monospace;
          padding:3px 8px;border-radius:20px;}
        .gp-status.ok{background:rgba(62,207,142,.12);color:var(--green);border:1px solid rgba(62,207,142,.3);}
        .gp-status.err{background:rgba(232,200,74,.1);color:var(--orange);border:1px solid rgba(232,200,74,.3);}
        .gp-editor{width:100%;background:var(--bg);border:1px solid var(--border);
          border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;
          font-size:12px;padding:10px;resize:vertical;min-height:200px;outline:none;
          line-height:1.7;transition:border-color .2s;white-space:pre;overflow-wrap:normal;overflow-x:auto;}
        .gp-editor:focus{border-color:var(--accent);}
        .gp-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
          gap:12px;padding:40px;color:var(--text3);text-align:center;}
        .gp-tabs{display:flex;gap:6px;margin-bottom:4px;justify-content: center;}
        .gp-hint{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;
          line-height:1.6;background:var(--surface2);border:1px solid var(--border);
          border-radius:8px;padding:10px;}
        .gp-hint b{color:var(--accent);}
      `;
      document.head.appendChild(s);
    })();

    // Executa o plugin como um script global
    function _executarPluginGlobal(id, codigo) {
      const old = document.getElementById('plugin-script-' + id);
      if (old) old.remove();
      const s = document.createElement('script');
      s.id = 'plugin-script-' + id;
      s.textContent = codigo;
      document.body.appendChild(s);
    }

   // Carrega dinamicamente os plugins APENAS se estiverem "Ativos"
    async function _pluginsDinamicosCarregar() {
      try {
        const lista = await _PluginDB.listar();
        for (const p of lista) {
          if (p.meta?.ativo !== false) {
            _executarPluginGlobal(p.id, p.codigo);
          }
        }
      } catch(e) {
        console.error('[Plugin Dinâmico] Erro ao listar plugins:', e);
      }
    }

    // Gerenciador de "Ligar e Desligar" real do Plugin (Zero Overhead)
    window._gpToggleAtivo = async function(id, ativar) {
      const lista = await _PluginDB.listar();
      const p = lista.find(x => x.id === id);
      if (!p) return;

      if (!p.meta) p.meta = {};
      p.meta.ativo = ativar;
      await _PluginDB.salvar(p.id, p.codigo, p.meta);

      if (ativar) {
        _executarPluginGlobal(p.id, p.codigo);
        setTimeout(() => {
          if (PL[id] && S.plugins[id] === undefined) { S.plugins[id] = true; save(); }
          renderAll();
          _gpRender('lista');
          toast('✅ Plugin iniciado!', 'ok');
        }, 50);
      } else {
        // Limpeza profunda para liberar RAM e sumir com o plugin do mapa
        document.getElementById('plugin-script-' + p.id)?.remove(); // Remove tag script
        document.getElementById('css-' + p.id)?.remove(); // Remove CSS do plugin se tiver
        document.getElementById(p.id + 'Screen')?.remove(); // Fecha tela extra se tiver
        document.getElementById(p.id + 'Btn')?.remove(); // Remove botão superior

        if (PL[p.id] && PL[p.id].onToggle && S.plugins[p.id]) {
          try { PL[p.id].onToggle(false); } catch(e){}
        }

        delete PL[p.id]; // Exclui registro do núcleo
        delete S.plugins[p.id]; // Exclui da memória de salvamento
        save();
        renderAll(); // Força recarregar interface inteira sem o plugin
        _gpRender('lista');
        toast('⏸ Plugin pausado (Memória liberada)', 'aviso');
      }
    };

    // Abre tela do gerenciador
    function abrirGerenciadorPlugins() {
      const main = document.querySelector('.main');
      let s = document.getElementById('gpScreen');
      if (!s) {
        s = document.createElement('div');
        s.id = 'gpScreen'; s.className = 'gp-screen';
        document.querySelector('.body').appendChild(s);
      }
      const isOpen = s.style.display === 'flex';
      if (isOpen) {
        s.style.display = 'none'; main.style.display = 'flex';
        return;
      }
      main.style.display = 'none'; s.style.display = 'flex';
      _gpRender();
    }

    function _gpFiltrar(q) {
  const qu = (q || '').toLowerCase().trim();
  document.querySelectorAll('#gpScreen .gp-card[data-plugin-id]').forEach(card => {
    const nome = card.querySelector('.gp-card-name')?.textContent?.toLowerCase() || '';
    const desc = card.querySelector('.gp-card-desc')?.textContent?.toLowerCase() || '';
    card.style.display = (!qu || nome.includes(qu) || desc.includes(qu)) ? '' : 'none';
  });
}
    async function _gpRender(aba) {
      const s = document.getElementById('gpScreen'); if (!s) return;
      const abaAtual = aba || s.dataset.aba || 'lista';
      s.dataset.aba = abaAtual;

      let lista = [];
      try { lista = await _PluginDB.listar(); } catch(e) {}

      const listaHtml = lista.length === 0
        ? `<div class="gp-empty">
            <div style="font-size:48px;opacity:.2">🔌</div>
            <div style="font-size:15px;font-weight:700;color:var(--text2)">Nenhum plugin instalado</div>
            <div style="font-size:13px">Use a aba "Adicionar" para instalar</div>
           </div>`
        : lista.map(p => {
            const isAtivo = p.meta?.ativo !== false;
            const data = new Date(p.ts).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
            return `<div class="gp-card" id="gp-card-${p.id}" data-plugin-id="${p.id}">
              <div class="gp-card-header">
                <div class="gp-card-icon">${p.meta?.icon||'🔌'}</div>
                <div class="gp-card-info">
                  <div class="gp-card-name">${esc(p.meta?.name||p.id)}</div>
                  <div class="gp-card-desc">${esc(p.meta?.desc||'Plugin dinâmico')}</div>
                  <div class="gp-card-ts">Instalado em ${data}</div>
                </div>
                <span class="gp-status ${isAtivo?'ok':'err'}">${isAtivo?'✓ Rodando':'⏸ Pausado'}</span>
              </div>
              <div class="gp-card-acoes">
                ${isAtivo
                  ? `<button class="gp-btn" style="color:var(--orange);border-color:rgba(240,128,75,.4)" onclick="_gpToggleAtivo('${p.id}', false)">⏸ Pausar</button>`
                  : `<button class="gp-btn success" onclick="_gpToggleAtivo('${p.id}', true)">▶️ Iniciar</button>`
                }
                <button class="gp-btn" onclick="_gpEditarCodigo('${p.id}')">✏️ Editar</button>
                <button class="gp-btn danger" onclick="_gpDeletar('${p.id}')">🗑 Remover</button>
              </div>
            </div>`;
          }).join('');

      const adicionarHtml = `
        <div class="gp-card">
          <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px">📥 Instalar plugin</div>
          <div class="gp-tabs">
            <button class="vtab ${s.dataset.subAba!=='arquivo'?'on':''}" onclick="document.getElementById('gpScreen').dataset.subAba='codigo';_gpRender('adicionar')">✏️ Colar código</button>
            <button class="vtab ${s.dataset.subAba==='arquivo'?'on':''}" onclick="document.getElementById('gpScreen').dataset.subAba='arquivo';_gpRender('adicionar')">📁 Importar arquivo</button>
          </div>
          ${s.dataset.subAba === 'arquivo' ? `
            <div class="gp-hint">
              Importe um arquivo <b>.js</b> exportado pelo ListFlow.<br>
              O arquivo deve conter o código do plugin.
            </div>
            <button class="gp-btn pri" style="width:100%;padding:12px;font-size:14px" onclick="_gpImportarArquivo()">
              📁 Selecionar arquivo .js
            </button>
          ` : `
            <div class="gp-hint">
              Cole o código do plugin abaixo.<br>
              Use <b>reg('id', {...})</b> para registrar.<br>
              A tecla Tab agora funciona para indentação!
            </div>
            <textarea class="gp-editor" id="gpCodigo" onkeydown="window._gpTabFix(event)" placeholder="// Cole o código do plugin aqui
// Exemplo:
reg('meu-plugin', {
  name: 'Meu Plugin',
  icon: '⭐',
  desc: 'Descrição do plugin',
  def: false,
  meta(item) {
    return item.destaque ? '⭐' : '';
  }
});"></textarea>
            <div style="display:flex;gap:8px;margin-top:4px;">
              <button class="gp-btn" onclick="document.getElementById('gpCodigo').value=''">🗑 Limpar</button>
              <button class="gp-btn pri" style="flex:1;padding:10px" onclick="_gpInstalar()">⚡ Instalar plugin</button>
            </div>
          `}
        </div>
        <div class="gp-card">
          <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px">📦 Backup de Plugins</div>
          <div style="font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:8px">
            Exporte ou importe todos os seus plugins de uma só vez usando um arquivo JSON seguro.
          </div>
          <div style="display:flex;gap:8px;">
            <button class="gp-btn success" style="flex:1;padding:10px" onclick="_gpExportarTodos()">⬇ Exportar Tudo</button>
            <button class="gp-btn pri" style="flex:1;padding:10px" onclick="_gpImportarTodos()">⬆ Importar Tudo</button>
          </div>
        </div>`;

      s.innerHTML = `
        <div style="flex-direction: row-reverse;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;flex-shrink:0">
          <div style="font-size:18px;font-weight:800;color:var(--text)">🔌 Plugins Dinâmicos</div>
          <button onclick="abrirGerenciadorPlugins()"
            style="padding: 7px 35px;border-radius:8px;border:1px solid var(--border);
            background:var(--surface2);color:var(--text2);font-size:12px;font-weight:600;
            font-family:'Syne',sans-serif;cursor:pointer;">✕ Fechar</button>
        </div>

        <div class="gp-tabs">
          <button class="vtab ${abaAtual==='lista'?'on':''}" onclick="_gpRender('lista')">
            🔌 Instalados (${lista.length})
          </button>
          <button class="vtab ${abaAtual==='adicionar'?'on':''}" onclick="_gpRender('adicionar')">
            ➕ Adicionar
          </button>
        </div>

            ${abaAtual === 'lista' ? `
      <input
        type="text"
        placeholder="🔍 Buscar plugin..."
        oninput="_gpFiltrar(this.value)"
        style="width:100%;background:var(--surface2);border:1px solid var(--border);
          border-radius:var(--r);color:var(--text);font-family:'Syne',sans-serif;
          font-size:13px;padding:8px 12px;outline:none;transition:border-color .2s;box-sizing:border-box;"
        onfocus="this.style.borderColor='var(--accent)'"
        onblur="this.style.borderColor='var(--border)'"
      >
    ` : ''}
  </div>

  <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding-top:10px">
    ${abaAtual === 'lista' ? listaHtml : adicionarHtml}
    </div>
      `;
    }

    async function _gpInstalar() {
      const codigo = document.getElementById('gpCodigo')?.value.trim();
      if (!codigo) { alert('Cole o código do plugin primeiro.'); return; }

      // Extrai metadados do código e FORÇA start 'ativo'
      let meta = { name: 'Plugin', icon: '🔌', desc: '', ativo: true };
      let pluginId = 'plugin-' + genId();

      const idMatch = codigo.match(/reg\s*\(\s*['"`]([^'"`]+)['"`]/);
      if (idMatch) pluginId = idMatch[1];

      const nameMatch = codigo.match(/name\s*:\s*['"`]([^'"`]+)['"`]/);
      const iconMatch = codigo.match(/icon\s*:\s*['"`]([^'"`]+)['"`]/);
      const descMatch = codigo.match(/desc\s*:\s*['"`]([^'"`]+)['"`]/);
      if (nameMatch) meta.name = nameMatch[1];
      if (iconMatch) meta.icon = iconMatch[1];
      if (descMatch) meta.desc = descMatch[1];

      try {
        new Function(codigo);
      } catch(e) {
        alert('❌ Erro de sintaxe no código do plugin:\n\n' + e.message);
        return;
      }

      try {
        await _PluginDB.salvar(pluginId, codigo, meta);
        _executarPluginGlobal(pluginId, codigo);
        renderAll();
        _gpRender('lista');
        
        const t = document.createElement('div');
        t.textContent = `✅ Plugin "${meta.name}" instalado!`;
        t.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(62,207,142,.15);border:1px solid rgba(62,207,142,.4);color:var(--green);padding:10px 20px;border-radius:99px;font-family:Syne,sans-serif;font-size:14px;font-weight:700;z-index:9000;white-space:nowrap;';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
      } catch(e) {
        alert('Erro ao salvar plugin: ' + e.message);
      }
    }

    function _gpImportarArquivo() {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = '.js,.txt';
      inp.onchange = async e => {
        const f = e.target.files[0]; if (!f) return;
        const reader = new FileReader();
        reader.onload = ev => {
          const s = document.getElementById('gpScreen');
          if (s) { s.dataset.subAba = 'codigo'; }
          _gpRender('adicionar');
          setTimeout(() => {
            const editor = document.getElementById('gpCodigo');
            if (editor) { editor.value = ev.target.result; editor.focus(); }
          }, 100);
        };
        reader.readAsText(f);
      };
      inp.click();
    }

    async function _gpEditarCodigo(id) {
      const lista = await _PluginDB.listar();
      const p = lista.find(x => x.id === id);
      if (!p) return;
      openM(`✏️ Editar — ${esc(p.meta?.name||id)}`, `
        <div style="display:flex;flex-direction:column;gap:8px">
          <textarea id="gpEditArea" class="gp-editor" style="min-height:260px" onkeydown="window._gpTabFix(event)">${esc(p.codigo)}</textarea>
          <div style="display:flex;gap:8px">
            <button class="btn" style="flex:1" onclick="
              navigator.clipboard?.writeText(document.getElementById('gpEditArea').value)
                .then(()=>alert('✅ Copiado!'))
            ">📋 Copiar</button>
            <button class="btn pri" style="flex:2" onclick="_gpSalvarEdicao('${id}')">💾 Salvar Alterações</button>
          </div>
        </div>
      `, null);
    }

    window._gpSalvarEdicao = async function(id) {
      const codigo = document.getElementById('gpEditArea').value.trim();
      if(!codigo) return;
      
      try {
        new Function(codigo);
      } catch(e) {
        alert('❌ Erro de sintaxe no código:\n\n' + e.message);
        return;
      }
      
      const lista = await _PluginDB.listar();
      const p = lista.find(x => x.id === id);
      if(!p) return;
      
      p.codigo = codigo;
      const nameMatch = codigo.match(/name\s*:\s*['"`]([^'"`]+)['"`]/);
      const iconMatch = codigo.match(/icon\s*:\s*['"`]([^'"`]+)['"`]/);
      const descMatch = codigo.match(/desc\s*:\s*['"`]([^'"`]+)['"`]/);
      if (nameMatch) p.meta.name = nameMatch[1];
      if (iconMatch) p.meta.icon = iconMatch[1];
      if (descMatch) p.meta.desc = descMatch[1];

      // Quando edita, força rodar automaticamente
      p.meta.ativo = true; 
      await _PluginDB.salvar(id, codigo, p.meta);
      _executarPluginGlobal(id, codigo);
      
      closeM();
      renderAll();
      _gpRender('lista');
      toast('✅ Código atualizado e recarregado!', 'ok');
    };

    async function _gpExportarTodos() {
      const lista = await _PluginDB.listar();
      if (!lista.length) { alert('Nenhum plugin para exportar.'); return; }
      
      const backup = { tipo: 'listflow_plugins_backup', plugins: lista };
      const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'listflow_plugins_backup_' + new Date().toLocaleDateString('pt-BR').replace(/\//g,'-') + '.json';
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    }

    function _gpImportarTodos() {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = '.json';
      inp.onchange = async e => {
        const f = e.target.files[0]; if (!f) return;
        const reader = new FileReader();
        reader.onload = async ev => {
          try {
            const d = JSON.parse(ev.target.result);
            if (d.tipo !== 'listflow_plugins_backup' || !Array.isArray(d.plugins)) {
              alert('Arquivo de backup de plugins inválido. Certifique-se de usar o botão "Exportar Tudo".');
              return;
            }
            
            let contador = 0;
            for(const p of d.plugins) {
              await _PluginDB.salvar(p.id, p.codigo, p.meta);
              // Injeta apenas os que foram exportados como "rodando"
              if (p.meta?.ativo !== false) {
                _executarPluginGlobal(p.id, p.codigo);
              }
              contador++;
            }
            
            renderAll();
            _gpRender('lista');
            alert(`✅ ${contador} plugins restaurados com sucesso!`);
          } catch(err) {
            alert('Erro ao ler arquivo: ' + err.message);
          }
        };
        reader.readAsText(f);
      };
      inp.click();
    }

    async function _gpDeletar(id) {
      const lista = await _PluginDB.listar();
      const p = lista.find(x => x.id === id);
      const nome = p?.meta?.name || id;
      openM('🗑️ Remover plugin', `
        <div style="text-align:center;padding:8px 0;display:flex;flex-direction:column;gap:12px;align-items:center">
          <div style="font-size:40px">⚠️</div>
          <div style="font-size:15px;color:var(--text)">Remover "${esc(nome)}"?</div>
          <div style="font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace">
            O plugin será removido permanentemente.<br>Use o backup se quiser salvar antes.
          </div>
        </div>
        <div class="macts">
          <button class="btn" onclick="closeM()">Cancelar</button>
          <button class="btn" style="background:var(--red);border-color:var(--red);color:white;flex:1;margin-top:11px"
            onclick="closeM();_gpDeletarConfirmar('${id}')">🗑️ Remover</button>
        </div>
      `, null);
    }

    async function _gpDeletarConfirmar(id) {
      // Força a limpeza do DOM se estiver rodando
      document.getElementById('plugin-script-' + id)?.remove();
      document.getElementById('css-' + id)?.remove();
      document.getElementById(id + 'Screen')?.remove();
      document.getElementById(id + 'Btn')?.remove();
      
      await _PluginDB.deletar(id);
      
      delete PL[id];
      delete S.plugins[id];
      save();
      renderAll();
      _gpRender('lista');
    }
    
    // ══════════════════════════════════════════════════════
    //  BOOT
    // ══════════════════════════════════════════════════════
    load();
    // Carrega plugins dinâmicos do IndexedDB ANTES de inicializar
    _pluginsDinamicosCarregar().then(() => {
      Object.values(PL).forEach(p => { if (p.onInit) p.onInit(); });
      if (!S._view) S._view = 'list';
      Object.values(PL).forEach(p => { if (p.def && S.plugins[p.id] === undefined) S.plugins[p.id] = true; });
      Object.values(PL).forEach(p => { if (pon(p.id) && p.onToggle) p.onToggle(true); });
      if (pon('theme') && PL.theme?.onToggle) PL.theme.onToggle(true);
      if (!S.lists.length) {
        const d = { id: genId(), name: '✨ Bem-vindo ao ListFlow!', items: [], color: '#7c6af7' };
        d.items = parseT(`- Toque em ☰ para abrir o menu lateral
- Ative plugins no menu lateral
  - Cada plugin adiciona funcionalidades
  - Experimente Tags, Prazo, Kanban...
- Botão ⊕ para criar sub-itens
  - Aninhamento infinito!
    - Como este aqui 👋
- Importe listas pela área de texto
- Tab para indentar (teclado físico)
- Toque em "Como criar um plugin" no rodapé do menu`);
        S.lists.push(d); S.active = d.id; save();
      }
      renderAll();
    });
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[SW] OK:', reg.scope))
          .catch(err => console.error('[SW] Erro:', err));
      });
    }
  </script>
</body>
</html>
